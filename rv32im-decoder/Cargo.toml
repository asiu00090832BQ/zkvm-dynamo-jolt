[package]
name = "rv32im-decoder"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["zkvm-dynamo-jolt contributors"]
description = "RV32IM instruction decoder and M-extension limb decomposition utilities for zkVM verification."

[lib]
name = "rv32im_decoder"
path = "src/lib.rs"

[[bin]]
name = "decoder-cli"
path = "src/bin/decoder_cli.rs"

documentation = "https://docs.rs/rv32im-decoder"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
thiserror = "1.0"

[dev-dependencies]
rand = "0.8"
