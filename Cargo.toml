[workspace.dependencies]
ark-ff = "0.5.0"
ark-poly = "0.5.0"
ark-std = "0.5.0"
ark-ec = "0.5.0"
ark-bn254 = "0.5.0"
goblin = "0.8.0"
elf = "0.7.0"
sha2 = "0.10"
dynamo-invariants = { path = "dynamo-invariants" }
jolt-sumcheck = { path = "jolt-sumcheck" }
zeroos-mem = { path = "zeroos-mem" }
rv32im-decoder = { path = "rv32im-decoder" }
hardened-elf-loader = { path = "hardened-elf-loader" }
compiler-frontend = { path = "compiler-frontend" }