[package]
name = "zkvm-dynamo-jolt"
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    "dynamo-invariants",
    "jolt-sumcheck",
    "zeroos-mem",
    "zkvm-core",
]
resolver = "2"

[dependencies]
zkvm-core = { path = "zkvm-core" }
ark-ff = { workspace = true }
ark-ec = { workspace = true }
ark-bn254 = { workspace = true }

[workspace.dependencies]
dynamo-invariants = { path = "dynamo-invariants" }
jolt-sumcheck = { path = "jolt-sumcheck" }
zeroos-mem = { path = "zeroos-mem" }
zkvm-core = { path = "zkvm-core" }
ark-ff = "0.4.0"
ark-poly = "0.4.0"
ark-std = "0.4.0"
ark-ec = "0.4.0"
ark-bn254 = "0.4.0"
ark-test-curves = "0.4.0"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
