[workspace]
members = [
    "crates/dynamo-invariants",
    "crates/jolt-sumcheck",
    "crates/zeroos-mem",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"
authors = ["OpenAI"]

[workspace.dependencies]
dynamo-invariants = { path = "crates/dynamo-invariants" }
jolt-sumcheck = { path = "crates/jolt-sumcheck" }
zeroos-mem = { path = "crates/zeroos-mem" }
