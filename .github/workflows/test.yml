name: Test
on:
  push:
    branches: [ main, fix/build-recovery-consolidated ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Test
      run: cargo test --workspace --verbose 
