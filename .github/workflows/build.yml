name: Build
on:
  push:
    branches: [ main, fix/build-recovery-consolidated ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --verbose
    - name: Verify Binary
      run: ls -lR target/debug/
