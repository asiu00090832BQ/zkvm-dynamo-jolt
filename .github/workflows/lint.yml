name: Lint
on: 
  push:
    branches: [ main, fix/build-recovery-consolidated ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check format
      run: cargo fmt -- --check
    - name: Clippy
      run: cargo clippy -- -D warnings
